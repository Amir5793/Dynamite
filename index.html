<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style/index.css">
    <title>Dynamite</title>
</head>
<body>
    <div class="book">
        <div class="close-book">
            <img src="./img/home/closed book.png" alt="book">
            <h1>tap to start</h1>
        </div>
        <div class="open-book">
            <img src="./img/home/opened book.png" alt="book">
            <div class="main-options">
                <h1 class="start">start</h1>
                <h1 class="settings">settings</h1>
                <h1 class="credits">credits</h1>
            </div>
            <div class="start-options">
                <div class="players" style="display: none;">
                    <h1 class="two-players">two players</h1>
                    <h1 class="three-players">three players</h1>
                    <h1 class="four-players">four players</h1>
                </div>
                <div class="seasons" style="display: none;">
                    <h1 class="classic">classic</h1>
                    <h1>coming soon...</h1>
                </div>
                <div class="user-names" style="display: none;"></div>
            </div>
        </div>
    </div>

    <script src="./app/index.js"></script>
</body>
</html>
