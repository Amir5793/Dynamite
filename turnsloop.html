<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style/turnsloop.css">
    <title>Dynamite</title>
</head>
<body>
    <div class="DOT-countainer">
        <!-- <div class="DOT" id="players-palace-DOT">
            you
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24"><path fill="white" d="M21 9h-6v13h-2v-6h-2v6H9V9H3V7h18m-9-5a2 2 0 0 1 2 2a2 2 0 0 1-2 2a2 2 0 0 1-2-2c0-1.11.89-2 2-2"/></svg>
        </div> -->
    </div>
    <div class="map">
        <img src="./img/turnsloop/maps/house.png" alt="">
    </div>

    <div class="player-name"></div>
    <button class="next-player-btn">Next Player</button>

    <div class="inventory-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="70" height="70" viewBox="0 0 24 24"><path fill="white" d="M21 9h-6v13h-2v-6h-2v6H9V9H3V7h18m-9-5a2 2 0 0 1 2 2a2 2 0 0 1-2 2a2 2 0 0 1-2-2c0-1.11.89-2 2-2"/></svg>
        <h1>inventory</h1>
    </div>
    <div class="masseges-modal">
        <!-- <h1>"X" dameged your right foot</h1> -->
    </div>

    <div class="health-bar">
        <div class="health">HP</div>
    </div>
    <div class="xp-bar">
        <div class="xp"></div>
    </div>

    <div class="main-handcard-card">
        <div class="flip-ico"></div>
        <div class="image"></div>
        <div class="captions"></div>
    </div>
    <div class="handcards">
        <div class="handcard1" id="handcard"></div>
        <div class="handcard2" id="handcard"></div>
        <div class="handcard3" id="handcard"></div>
        <div class="handcard4" id="handcard"></div>
        <div class="handcard5" id="handcard"></div>
        <div class="handcard6" id="handcard"></div>
        <div class="handcard7" id="handcard"></div>
        <div class="handcard8" id="handcard"></div>
        <div class="handcard9" id="handcard"></div>
        <div class="handcard10" id="handcard"></div>
    </div>

    <div class="inventory-modal" style="display: none;">
        <div class="inventory-countainer">
            <div class="inventory-handcards">
                <div class="inventory-handcard1" id="inventory-handcard"></div>
                <div class="inventory-handcard2" id="inventory-handcard"></div>
                <div class="inventory-handcard3" id="inventory-handcard"></div>
                <div class="inventory-handcard4" id="inventory-handcard"></div>
                <div class="stickman"><svg xmlns="http://www.w3.org/2000/svg"  viewBox="0 0 24 24"><path fill="white" d="M21 9h-6v13h-2v-6h-2v6H9V9H3V7h18m-9-5a2 2 0 0 1 2 2a2 2 0 0 1-2 2a2 2 0 0 1-2-2c0-1.11.89-2 2-2"/></svg></div>
                <div class="inventory-handcard5" id="inventory-handcard"></div>
                <div class="inventory-handcard6" id="inventory-handcard"></div>
                <div class="inventory-handcard7" id="inventory-handcard"></div>
                <div class="inventory-handcard8" id="inventory-handcard"></div>
                <div class="inventory-handcard9" id="inventory-handcard"></div>
                <div class="inventory-handcard10" id="inventory-handcard"></div>
            </div>
            <div class="minicards">
                <div class="minidar1" id="minicard"></div>
                <div class="minidar2" id="minicard"></div>
                <div class="minidar3" id="minicard"></div>
                <div class="minidar4" id="minicard"></div>
                <div class="minidar5" id="minicard"></div>
                <div class="minidar6" id="minicard"></div>
                <div class="minidar7" id="minicard"></div>
                <div class="minidar8" id="minicard"></div>
                <div class="minidar9" id="minicard"></div>
                <div class="minidar10" id="minicard"></div>
                <div class="minidar11" id="minicard"></div>
                <div class="minidar12" id="minicard"></div>
                <div class="minidar13" id="minicard"></div>
                <div class="minidar14" id="minicard"></div>
                <div class="minidar15" id="minicard"></div>
                <div class="minidar16" id="minicard"></div>
                <div class="minidar17" id="minicard"></div>
                <div class="minidar18" id="minicard"></div>
                <div class="minidar19" id="minicard"></div>
                <div class="minidar20" id="minicard"></div>
                <div class="minidar21" id="minicard"></div>
            </div>
            <div class="crafting-table">
                <svg class="inventory-back" xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48"><path fill="white" fill-rule="evenodd" stroke="white" stroke-linejoin="round" stroke-width="4" d="M44 40.836q-7.34-8.96-13.036-10.168t-10.846-.365V41L4 23.545L20.118 7v10.167q9.523.075 16.192 6.833q6.668 6.758 7.69 16.836Z" clip-rule="evenodd"/></svg>
                <div class="craft-item"></div>
                <div class="craft-item"></div>
                <div class="craft-item"></div>
                <div class="craft-item"></div>
                <div class="craft-item"></div>
                <div class="craft-item"></div>
                <div class="craft-item"></div>
                <div class="craft-item"></div>
                <div class="craft-item"></div>
            </div>
            
        </div>
        <div class="inventory-options-countainer">
            <button class="night-inventory-option">Night Options</button>
            <button class="chat-inventory-option">Chat With Players</button>
            <button class="place-invetory-option">Place Options</button>
        </div>

        <div class="night-options">
            <button class="night-option">potrolling</button>
            <button class="night-option">change Place</button>
            <button class="night-option">sleep</button>
            <svg class="night-options-back-btn" xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48"><path fill="white" fill-rule="evenodd" stroke="white" stroke-linejoin="round" stroke-width="4" d="M44 40.836q-7.34-8.96-13.036-10.168t-10.846-.365V41L4 23.545L20.118 7v10.167q9.523.075 16.192 6.833q6.668 6.758 7.69 16.836Z" clip-rule="evenodd"/></svg>
        </div>
        <div class="potrolling-options">
            <!-- <h1>where do you want to go?</h1> -->
        </div>
        <div class="change-place-options">
                    
            <img src="./img/zombie-zone-map.png" alt="map" class="zombie-zone">
            
            <div class="modal">
                <form class="place-form">
                    <label for="place-input" class="place-label"></label>
                    <label for="place-input" class="place-second-label"></label>
                    <input type="number" max="18" min="1" class="place-input" id="place-input">
                </form>
            </div>

        </div>

        <div class="chat-with-friends-options">
            <button class="private-chat">Private Chat</button>
            <button class="public-chat">Public Chat</button>
        </div>

        <div class="private-chat-options">
            <div class="private-chat-option">
                <div class="private-masseges-countainer">
                    <div class="sent-masseges"></div>
                    <div class="received-masseges"></div>
                </div>
                <input type="text" placeholder="Type your text" class="private-massage-input">
                <div class="send private-send">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48"><path fill="white" d="M7.262 4.244c-1.787-.893-3.765.812-3.146 2.711L8.13 19.26a2 2 0 0 0 1.573 1.352l15.86 2.643c.835.14.835 1.34 0 1.48L9.704 27.378a2 2 0 0 0-1.573 1.352L4.116 41.042c-.62 1.9 1.359 3.605 3.146 2.712l35.494-17.742c1.659-.83 1.659-3.197 0-4.026z"/></svg>
                </div>
            </div>
            
            <div class="players-countainer">
                <h1>wich player do you want to chat with</h1>
            </div>
            
        </div>

        <div class="public-chat-options">
            <div class="public-masseges-countainer">
                <div class="sent-masseges"></div>
                <div class="received-masseges"></div>
            </div>
            <input type="text" placeholder="Type your text" class="public-massage-input">
            <div class="send public-send">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48"><path fill="white" d="M7.262 4.244c-1.787-.893-3.765.812-3.146 2.711L8.13 19.26a2 2 0 0 0 1.573 1.352l15.86 2.643c.835.14.835 1.34 0 1.48L9.704 27.378a2 2 0 0 0-1.573 1.352L4.116 41.042c-.62 1.9 1.359 3.605 3.146 2.712l35.494-17.742c1.659-.83 1.659-3.197 0-4.026z"/></svg>
            </div>

        </div>
        
    </div>

    <script src="./app/turnsloop.js"></script> 
</body>
</html>
